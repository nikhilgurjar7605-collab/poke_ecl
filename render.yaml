# PokeEclipse Auto-Hunter - Render Deployment Configuration

services:
  - type: web
    name: pokeeclipse-auto-hunter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m poke
    
    # Environment Variables (set these in Render Dashboard)
    # API_ID=your_api_id
    # API_HASH=your_api_hash
    # STRING_SESSION=your_session_string
    # GC_ID=your_group_id
    
    # Port Configuration - Required for Render Web Services
    envVars:
      - key: PORT
        value: 8080
      - key: HOST
        value: 0.0.0.0
    
    # Health Check Path - Keeps bot alive on cloud platforms
    healthCheckPath: /health
    
    # Instance Size
    plan: free
    
    # Region
    region: oregon
    
    # Auto-Deploy
    autoDeploy: true
    
    # Keep-alive settings for stability
    dockerfilePath: ./Dockerfile
